<!doctype html>
<html lang="en">
  <head>
    <link rel="icon" type="image/png" href="/msc-logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BlueHarbor Terminal</title>
    <script>
      // Applica il tema salvato prima del render per evitare un flash del
      // tema sbagliato (FOUC) al caricamento della pagina.
      (function () {
        try {
          var stored = localStorage.getItem('blueharbor-theme');
          var theme = stored || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
